name: Update Problem Count

on:
  push:
    branches:
      - main

jobs:
  update-readme:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Count problems
        run: |
          COUNT=$(find . -name "*.c" | wc -l)
          echo "PROBLEMS=$COUNT" >> $GITHUB_ENV

      - name: Update README
        run: |
          sed -i "s/PROBLEMS_SOLVED:.*/PROBLEMS_SOLVED: $PROBLEMS/" README.md

      - name: Commit changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add README.md
          git commit -m "Update problem count" || echo "No changes"
          git push
