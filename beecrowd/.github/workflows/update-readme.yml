name: Update Problem Counter

on:
  push:
    branches:
      - main

jobs:
  update-readme:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Count C files
        id: counter
        run: |
          COUNT=$(find . -name "*.c" | wc -l)
          echo "count=$COUNT" >> $GITHUB_OUTPUT

      - name: Update README
        run: |
          sed -i "s/PROBLEMS_SOLVED:.*/PROBLEMS_SOLVED: ${{ steps.counter.outputs.count }}/" readme.md

      - name: Commit changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add readme.md
          git commit -m "Update problem counter" || echo "No changes"
          git push
